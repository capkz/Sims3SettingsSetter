name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write  # needed to create/update releases

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Cache the installed vcpkg packages — keyed on vcpkg.json so the cache
      # busts whenever dependencies change. The triplet is part of the key so
      # adding other triplets later doesn't collide.
      - name: Cache vcpkg packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: vcpkg_installed
          key: vcpkg-x86-windows-static-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-x86-windows-static-

      - name: Restore NuGet packages
        run: nuget restore Sims3SettingsSetter.sln
        shell: pwsh

      - name: Install vcpkg dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install --triplet=x86-windows-static
        shell: pwsh

      - name: Build Release
        run: msbuild Sims3SettingsSetter.sln /p:Configuration=Release /p:Platform=x86 /m /nologo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sims3SettingsSetter-${{ github.sha }}
          path: Release\Sims3SettingsSetter.asi
          if-no-files-found: error

      # Only publish a release on pushes to main (not PRs, not other branches)
      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $date = Get-Date -Format "yyyy-MM-dd"
          $tag = "dev-$date-$sha"
          $notes = "Automated build from commit ${{ github.sha }}`n`nhttps://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          # Delete the rolling 'latest-dev' tag/release if it exists, then recreate
          gh release delete latest-dev --yes 2>$null; $true
          git push origin :refs/tags/latest-dev 2>$null; $true

          gh release create latest-dev `
            --title "Latest Dev Build ($date)" `
            --notes $notes `
            --prerelease `
            Release\Sims3SettingsSetter.asi
        shell: pwsh
